<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Entry - Journey Journal</title>
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
    <div class="app-shell">

    <!-- Header -->
    <header class="page-header">
        <div class="page-header-content">
            <a href="journal-feed.html" class="back-btn" aria-label="Back">←</a>
            <div>
                <p class="page-header-subtitle">Create a new memory</p>
                <h1 class="page-header-title">New Entry</h1>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="app-content">
            <form id="entry-form" class="entry-form">
                <!-- Mood & Avatar Selection -->
                <section class="form-section card">
                    <h2 class="section-title">How are you feeling today?</h2>
                    <div class="mood-selector-large" id="mood-selector-large">
                        <!-- Moods with avatars will be loaded here -->
                    </div>
                    <div class="add-avatar-section">
                        <button type="button" class="btn-add-avatar" id="add-avatar-btn">
                            <span class="add-icon">+</span>
                            <span>Add Custom Avatar</span>
                        </button>
                    </div>
                    <input type="hidden" id="selected-mood" name="mood" required>
                    <input type="hidden" id="selected-avatar" name="avatar">
                </section>

                <!-- Today's Prompt -->
                <section class="form-section card">
                    <h2 class="section-title">Today's Reflection</h2>
                    <div class="prompt-box">
                        <p class="prompt-text" id="entry-prompt-display">Loading prompt...</p>
                        <div class="prompt-actions">
                            <button type="button" class="btn-refresh" id="new-prompt-btn">Get another prompt</button>
                        </div>
                    </div>
                </section>

                <!-- Write Entry -->
                <section class="form-section card">
                    <h2 class="section-title">Your Thoughts</h2>
                    <div class="form-group">
                        <textarea id="entry-content" name="content" placeholder="Write your journal entry here... There's no right or wrong way to express yourself." required rows="8" class="form-textarea"></textarea>
                    </div>
                </section>

                <!-- Category -->
                <section class="form-section card">
                    <h2 class="section-title">Category</h2>
                    <div class="form-group">
                        <select id="entry-category" name="category" class="form-select">
                            <option value="reflection">Reflection</option>
                            <option value="gratitude">Gratitude</option>
                            <option value="creative">Creative</option>
                            <option value="thoughts">Thoughts</option>
                            <option value="dreams">Dreams</option>
                            <option value="health">Health & Wellness</option>
                        </select>
                    </div>
                </section>

                <!-- Photo Upload -->
                <section class="form-section card">
                    <h2 class="section-title">Add Photos (Optional)</h2>
                    <p class="section-subtitle">Capture moments and memories</p>
                    
                    <div class="photo-upload" id="photo-upload">
                        <input type="file" id="entry-photos" name="photos" accept="image/*" multiple hidden>
                        <label for="entry-photos" class="upload-area">
                            <div class="upload-icon">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
                                    <path d="M21 15l-5-5L5 21"/>
                                </svg>
                            </div>
                            <p class="upload-title">Add your photos</p>
                            <span class="upload-hint">Click to browse or drag images</span>
                        </label>
                    </div>

                    <div class="photo-preview" id="photo-preview">
                        <!-- Photo previews will be shown here -->
                    </div>
                </section>

                <!-- Tags -->
                <section class="form-section card">
                    <h2 class="section-title">Tags (Optional)</h2>
                    <p class="section-subtitle">Help organize your memories</p>
                    <div class="form-group">
                        <input type="text" id="entry-tags" placeholder="Add tags separated by commas (e.g., family, travel, self-care)" class="form-input">
                        <div class="tags-list" id="tags-list"></div>
                    </div>
                </section>

                <!-- Form Actions -->
                <section class="form-actions">
                    <button type="button" class="btn btn-secondary" id="save-draft-btn">Save as Draft</button>
                    <button type="submit" class="btn btn-primary btn-large">Save Entry</button>
                </section>

            </form>
    </main>

    </div>

    <!-- Confirm Modal -->
    <div class="confirm-modal-overlay" id="confirm-modal-overlay" role="dialog" aria-modal="true">
        <div class="confirm-modal">
            <div class="confirm-modal-body">
                <p class="confirm-modal-icon">⚠️</p>
                <p class="confirm-modal-message" id="confirm-modal-message"></p>
            </div>
            <div class="confirm-modal-footer">
                <button type="button" class="modal-btn modal-btn-secondary" id="confirm-modal-cancel">Keep editing</button>
                <button type="button" class="modal-btn modal-btn-primary" id="confirm-modal-confirm">Discard</button>
            </div>
        </div>
    </div>

    <!-- Custom Avatar Modal -->
    <div class="avatar-modal-overlay" id="avatar-modal-overlay" role="dialog" aria-modal="true">
        <div class="avatar-modal">
            <div class="avatar-modal-header">
                <h2 class="avatar-modal-title">✨ Add Custom Avatar</h2>
                <button type="button" class="avatar-modal-close" id="avatar-modal-close" aria-label="Close">×</button>
            </div>
            <div class="avatar-modal-body">
                <div class="form-group">
                    <label class="form-label" for="custom-avatar-name">Name your feeling</label>
                    <input type="text" id="custom-avatar-name" class="form-input" placeholder="e.g., Hopeful, Anxious, Proud..." maxlength="20">
                </div>
                <div class="form-group">
                    <label class="form-label">Choose an animal that represents it</label>
                    <div class="animal-picker" id="animal-picker"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Pick a color</label>
                    <div class="color-picker" id="color-picker"></div>
                </div>
            </div>
            <div class="avatar-modal-footer">
                <button type="button" class="modal-btn modal-btn-secondary" id="avatar-modal-cancel">Cancel</button>
                <button type="button" class="modal-btn modal-btn-primary" id="save-avatar-btn">Save Avatar</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="data/moods.js"></script>
    <script src="data/prompts.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/avatars.js"></script>
    <script src="js/journal-entry.js"></script>
</body>
</html>
