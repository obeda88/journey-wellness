<!doctype html>

<html lang="en">

<head>

	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	
	<title>Feelings Wheel</title>
	
	<meta name="title" content="Feelings Wheel">
	<!-- <meta name="viewport" content="initial-scale = 1.0, maximum-scale = 1.0" /> -->
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />	
	
	<style type="text/css" media="screen">
		p, h2, label {
			font-family: Arial, sans-serif;
			font-size: 0.5em;
			color: #999;
			text-align: center
		}
		
		a {
			color: #666;
		}
		
		body {
			margin: 0;
			overflow-x: hidden;
		}

		.back-btn {
			position: fixed;
			top: 20px;
			left: 20px;
			background: rgba(255, 255, 255, 0.9);
			border: none;
			font-size: 20px;
			cursor: pointer;
			padding: 8px 12px;
			border-radius: 8px;
			box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
			z-index: 100;
			transition: transform 0.3s;
		}

		.back-btn:hover {
			transform: translateX(-4px);
		}
		
		div.graphic {
			margin: 0 auto;
			width: 100%;
			max-width: 100vw;
			display: flex;
			justify-content: center;
			align-items: center;
			padding: 1rem;
			box-sizing: border-box;
			z-index: 0;
		}
		
		img {
			max-width: 100%;
			max-height: 75vh;
			object-fit: contain;
		}
		
		h2 {
			font-size: 1rem;
			line-height: 1.5rem;
			font-weight: normal;
			color: #232323;
		}
		
		div.announcement {
			max-width: 50%;
			margin: 2rem auto;
			padding: 1rem;
			border: 1px solid black;
			background-color: #FFF3D3;
			border-radius: 4px;
		}

		div.poll-message {
			max-width: 50%;
			margin: 2rem auto;
			padding: 1rem;
		}
		
		.venmo {
			background: url("venmo-dm.jpg") no-repeat;
			width: 350px;
			height: 407px;
			margin: 0 auto;
			padding: 0 1rem 1rem 1rem;
		}
		
		/* Enable custom rotate + pinch-zoom gestures */
		#wheelGraphic {
			touch-action: none;         /* allow JS to handle touch gestures */
			user-select: none;
			-webkit-user-drag: none;
			transform-origin: center center;
			will-change: transform;
		}
		
	</style>

	<link rel="stylesheet" type="text/css" href="css/toggle-styles.css" />

</head>

<body>
  
	<button class="back-btn" onclick="window.location.href='journey-dashboard.html'" aria-label="Back">&#8592;</button>

	<div class="graphic">
		<img src="feelings-wheel-new-2.webp" alt="feelings-wheel" id="wheelGraphic">
	</div>

	<div class="toggleContainer">
	  <div class="can-toggle">
	    <input id="a" type="checkbox" name="toggleSwitch">
	    <label for="a">
	      <div class="can-toggle__label-text">Select Color Scheme</div>
	      <div class="can-toggle__switch" data-checked="New" data-unchecked="Original"></div>
	    </label>
	  </div>

	</div> 
	
<script src="js/fw-script.js"></script>	
</body>
</html>
