<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mood Calendar — Journey Wellness</title>
    <meta name="description" content="Visualise your emotional patterns over time with mood tracking.">
    <link rel="stylesheet" href="css/theme.css">
</head>
<body>
<div class="app-shell">

    <!-- ===== PAGE HEADER ===== -->
    <header class="page-header">
        <div class="page-header-content">
            <button class="back-btn" onclick="window.location.href='journey-dashboard.html'" aria-label="Back">&#8592;</button>
            <div>
                <h1 class="page-header-title">📅 Mood Calendar</h1>
                <p class="page-header-subtitle">Your emotional journey over time</p>
            </div>
        </div>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="app-content anim-fade-in">

        <!-- Stats Row -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">📔</div>
                <div class="stat-value" id="entries-this-month">0</div>
                <div class="stat-label">Entries This Month</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">😊</div>
                <div class="stat-value" id="most-common-mood">—</div>
                <div class="stat-label">Top Mood</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-value" id="consistency">0%</div>
                <div class="stat-label">Consistency</div>
            </div>
        </div>

        <!-- Month Navigation -->
        <div class="card">
            <div class="month-nav">
                <button class="month-btn" onclick="previousMonth()">&#8592; Prev</button>
                <span class="current-month" id="current-month"></span>
                <button class="month-btn" onclick="nextMonth()">Next &#8594;</button>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-grid" id="calendar"></div>
        </div>

        <!-- Legend -->
        <div class="card">
            <div class="section-header" style="margin-bottom:14px;">
                <h2 class="section-title">Mood Avatars</h2>
            </div>
            <div class="legend-grid" id="legend-grid">
                <!-- Populated by JS -->
            </div>
        </div>

    </main>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav">
        <a href="journey-dashboard.html" class="nav-item">
            <div class="nav-item-icon">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </div>
            <span class="nav-item-label">Home</span>
        </a>
        <a href="journal-feed.html" class="nav-item">
            <div class="nav-item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M8 7h8M8 12h8M8 17h5"/></svg>
            </div>
            <span class="nav-item-label">Journal</span>
        </a>
        <a href="activity-space.html" class="nav-item active">
            <div class="nav-item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            </div>
            <span class="nav-item-label">Trackers</span>
        </a>
        <a href="feelings-wheel.html" class="nav-item">
            <div class="nav-item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>
            <span class="nav-item-label">Info</span>
        </a>
        <a href="coping-space.html" class="nav-item">
            <div class="nav-item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <span class="nav-item-label">Coping</span>
        </a>
    </nav>

</div>

<script src="data/moods.js"></script>
<script src="js/storage.js"></script>
<script>
    const CUSTOM_AVATARS_KEY = 'journey-custom-avatars';

    function getCustomAvatars() {
        try { return JSON.parse(localStorage.getItem(CUSTOM_AVATARS_KEY) || '[]'); }
        catch (e) { return []; }
    }

    function getMoodMap() {
        const map = {};
        if (window.moodsData && window.moodsData.moods) {
            window.moodsData.moods.forEach(mood => {
                map[mood.id] = { emoji: mood.emoji, name: mood.name, color: mood.color };
            });
        }
        getCustomAvatars().forEach(avatar => {
            map[avatar.id] = { emoji: avatar.emoji, name: avatar.name, color: avatar.color };
        });
        return map;
    }

    function renderLegend() {
        const grid = document.getElementById('legend-grid');
        if (!grid) return;
        const moodMap = getMoodMap();
        grid.innerHTML = '';
        Object.entries(moodMap).forEach(([id, mood]) => {
            const item = document.createElement('div');
            item.className = 'legend-item';
            item.innerHTML = `<span class="legend-emoji">${mood.emoji}</span><span>${mood.name}</span>`;
            grid.appendChild(item);
        });
    }

    let currentDate = new Date();

    function renderCalendar() {
        const year  = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const moodMap = getMoodMap();

        document.getElementById('current-month').textContent =
            currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

        const firstDay    = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const entries = JSON.parse(localStorage.getItem('journey_entries') || '[]');
        const byDate  = {};
        entries.forEach(e => { byDate[new Date(e.createdAt).toDateString()] = e; });

        const cal = document.getElementById('calendar');
        cal.innerHTML = '';

        // Day headers
        ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
            const h = document.createElement('div');
            h.className = 'cal-day-header';
            h.textContent = d;
            cal.appendChild(h);
        });

        // Empty cells
        for (let i = 0; i < firstDay; i++) {
            const e = document.createElement('div');
            e.className = 'cal-day';
            cal.appendChild(e);
        }

        // Day cells
        for (let day = 1; day <= daysInMonth; day++) {
            const dayDate  = new Date(year, month, day);
            const dayStr   = dayDate.toDateString();
            const entry    = byDate[dayStr];
            const cell     = document.createElement('div');
            cell.className = 'cal-day' + (entry ? ' has-entry' : '');

            const num = document.createElement('div');
            num.className = 'cal-day-num';
            num.textContent = day;
            cell.appendChild(num);

            if (entry) {
                const moodData = moodMap[entry.mood];
                const emoji    = moodData ? moodData.emoji : '📔';
                const moodName = moodData ? moodData.name  : 'Unknown';

                const emojiEl = document.createElement('div');
                emojiEl.className = 'cal-day-emoji';
                emojiEl.textContent = emoji;
                cell.appendChild(emojiEl);

                const tip = document.createElement('div');
                tip.className = 'day-tooltip';
                tip.textContent = moodName + ' — ' + (entry.content || '').substring(0, 18) + '…';
                cell.appendChild(tip);

                cell.style.cursor = 'pointer';
                cell.onclick = () => viewEntry(entry.id);
            } else {
                const empty = document.createElement('div');
                empty.className = 'cal-day-empty';
                empty.textContent = '○';
                cell.appendChild(empty);
            }
            cal.appendChild(cell);
        }

        updateStats();
    }

    function updateStats() {
        const entries = JSON.parse(localStorage.getItem('journey_entries') || '[]');
        const year  = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const moodMap = getMoodMap();

        const thisMonth = entries.filter(e => {
            const d = new Date(e.createdAt);
            return d.getFullYear() === year && d.getMonth() === month;
        });

        document.getElementById('entries-this-month').textContent = thisMonth.length;

        const moodCounts = {};
        thisMonth.forEach(e => { moodCounts[e.mood] = (moodCounts[e.mood] || 0) + 1; });
        const top = Object.keys(moodCounts).reduce((a, b) => moodCounts[a] > moodCounts[b] ? a : b, 'none');
        const topData = moodMap[top];
        document.getElementById('most-common-mood').textContent = topData ? topData.emoji : '—';

        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const uniqueDays  = new Set(thisMonth.map(e => new Date(e.createdAt).getDate()));
        document.getElementById('consistency').textContent =
            Math.round((uniqueDays.size / daysInMonth) * 100) + '%';
    }

    function previousMonth() {
        currentDate.setMonth(currentDate.getMonth() - 1);
        renderCalendar();
    }

    function nextMonth() {
        currentDate.setMonth(currentDate.getMonth() + 1);
        renderCalendar();
    }

    function viewEntry(entryId) {
        sessionStorage.setItem('viewEntryId', entryId);
        window.location.href = 'journal-feed.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
        renderLegend();
        renderCalendar();
    });
</script>
</body>
</html>
