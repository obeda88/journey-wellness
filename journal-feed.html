<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal — Journey Wellness</title>
    <meta name="description" content="Your digital journal. Create, view and reflect on your thoughts and feelings.">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/journal.css">
</head>

<body>
    <div class="app-shell">

        <!-- ===== PAGE HEADER ===== -->
        <header class="page-header">
            <div class="page-header-content">
                <button class="back-btn" onclick="window.location.href='journey-dashboard.html'"
                    aria-label="Back">&#8592;</button>
                <div>
                    <h1 class="page-header-title">📔 My Journal</h1>
                    <p class="page-header-subtitle">Your memories &amp; reflections</p>
                </div>
            </div>
        </header>

        <!-- ===== MAIN CONTENT ===== -->
        <main class="app-content anim-fade-in">

            <!-- Date -->
            <div class="card"
                style="padding: 14px 20px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;">
                <p id="today-date"
                    style="font-weight:700; color:var(--text-heading); font-family:var(--font-display); font-size:15px;">
                </p>
                <span style="font-size:20px;">✨</span>
            </div>



            <!-- Mood Check -->
            <div class="mood-card" style="margin-bottom:12px; text-align:center;">
                <p class="mood-card-title">😊 How are you feeling?</p>
                <div class="mood-emojis" id="quick-mood-selector">
                    <!-- Populated by app.js -->
                </div>
                <div style="margin-top:16px;">
                    <button class="btn btn-dark btn-full" onclick="handleWriteJournalClick()"
                        style="max-width:260px; margin:0 auto; display:flex;">Write Journal ✍️</button>
                </div>
            </div>

            <!-- Journal Entries -->
            <div>
                <div class="section-header">
                    <h2 class="section-title">📔 Your Entries</h2>
                </div>
                <div id="entry-list" class="entry-list" style="display:flex; flex-direction:column; gap:12px;">
                    <p class="empty-state">No entries yet. Start journaling to see your memories here! ✨</p>
                </div>
            </div>

        </main>

        <!-- ===== BOTTOM NAV ===== -->
        <nav class="bottom-nav">
            <a href="journey-dashboard.html" class="nav-item">
                <div class="nav-item-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                    </svg>
                </div>
                <span class="nav-item-label">Home</span>
            </a>
            <a href="journal-feed.html" class="nav-item active">
                <div class="nav-item-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="3" />
                        <path d="M8 7h8M8 12h8M8 17h5" />
                    </svg>
                </div>
                <span class="nav-item-label">Journal</span>
            </a>
            <a href="activity-space.html" class="nav-item">
                <div class="nav-item-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                    </svg>
                </div>
                <span class="nav-item-label">Trackers</span>
            </a>
            <a href="feelings-wheel.html" class="nav-item">
                <div class="nav-item-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                </div>
                <span class="nav-item-label">Info</span>
            </a>
            <a href="coping-space.html" class="nav-item">
                <div class="nav-item-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                </div>
                <span class="nav-item-label">Coping</span>
            </a>
        </nav>

    </div>

    <!-- Entry Detail Modal -->
    <div class="entry-detail-overlay" id="entry-detail-overlay" role="dialog" aria-modal="true">
        <div class="entry-detail-modal">
            <div class="modal-handle"></div>
            <div class="entry-detail-header">
                <div class="entry-detail-avatar" id="entry-detail-avatar">🦉</div>
                <div class="entry-detail-meta">
                    <h2 class="entry-detail-date" id="entry-detail-date"></h2>
                    <p class="entry-detail-time" id="entry-detail-time"></p>
                </div>
                <button type="button" class="entry-detail-close" id="entry-detail-close"
                    aria-label="Close">&#215;</button>
            </div>
            <div class="entry-detail-body">
                <div class="entry-detail-prompt" id="entry-detail-prompt-section" style="display:none;">
                    <p class="entry-detail-prompt-label">Today's Prompt</p>
                    <p class="entry-detail-prompt-text" id="entry-detail-prompt"></p>
                </div>
                <div class="entry-detail-content" id="entry-detail-content"></div>
                <div class="entry-detail-photos" id="entry-detail-photos"></div>
                <div class="entry-detail-tags" id="entry-detail-tags"></div>
                <div class="entry-detail-info" id="entry-detail-info"></div>
            </div>
            <div class="entry-detail-footer">
                <button type="button" class="entry-detail-favorite" id="entry-detail-favorite">&#9825;
                    Favourite</button>
                <button type="button" class="entry-detail-close-btn" id="entry-detail-close-btn">Close</button>
            </div>
        </div>
    </div>

    <script src="data/moods.js"></script>
    <script src="data/prompts.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/avatars.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const today = new Date();
            const opts = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('today-date').textContent = today.toLocaleDateString('en-US', opts);

            if (typeof initializePage === 'function') initializePage();
        });
    </script>
</body>

</html>
